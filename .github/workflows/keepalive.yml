name: Keep Streamlit apps awake
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Wake the apps
        run: python wake.py
